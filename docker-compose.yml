version: '3.8'

services:
  yoga-bot:
    build: .
    container_name: yoga-asana-bot
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./bot_data:/app/bot_data
      - ./logs:/app/logs
    networks:
      - bot-network
    healthcheck:
      test: ["CMD", "python", "-c", "import telegram; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Опционально: мониторинг
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: yoga-bot-prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
  #   networks:
  #     - bot-network

networks:
  bot-network:
    driver: bridge
